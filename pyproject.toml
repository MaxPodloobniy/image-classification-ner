[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
]
ignore = [
    "E501",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true        # ML libs (TF, spaCy) lack complete stubs
disable_error_code = ["import-untyped"]
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
