[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true   # ML libs (TF, spaCy) lack complete stubs
warn_unused_ignores = true
warn_redundant_casts = true
